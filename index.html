<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./">
    <meta charset="UTF-8">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="./stylesheet/loading_mask.css" rel="stylesheet">
    <link href="./stylesheet/oreui.css" rel="stylesheet">
    <link href="./stylesheet/app.css" rel="stylesheet">
    <title>BE Skin 4D Maker</title>
</head>

<div class="loading_mask" id="loading_mask">
    <div>
        <div class="spinner"><img alt="" src="./images/Loading_white.gif" style="height:48px;"/></div>
        <div class="spinner"><div class="spinner"><span style="color:rgba(255,255,255,0.6);font-family:'NotoSans Bold',sans-serif;font-size:13px;">BE Skin 4D Maker</span></div></div>
    </div>
</div>

<body>
<dispaly-area>
    <header>
        <div class="header_left">
            <div class="header_item header_item_left" id="btn_back" onclick="goBack()" style="display:none;cursor:pointer;">
                <span class="header_left_icon" style="font-size:20px;padding:0 10px;">‹</span>
            </div>
        </div>
        <div class="header_logo">
            <div class="header_title" style="font-family:'Minecraft Ten',sans-serif;font-size:17px;color:#1E1E1F;letter-spacing:0.5px;">
                ⛏ BE Skin 4D Maker
            </div>
        </div>
        <div class="header_right">
            <div class="header_item header_item_right" onclick="showAbout()" style="cursor:pointer;">
                <img alt="info" class="header_right_icon" src="./images/Github.png" style="height:24px;width:24px;object-fit:contain;"/>
            </div>
        </div>
    </header>

    <display-body>
        <scroll-view class="main_scroll_view">
            <scroll-container class="primary_scroll_container" id="scroll_root">
                <main class="scroll_container" id="main_content">
                    <!-- injected by JS -->
                </main>
            </scroll-container>
            <custom-scrollbar class="primary_custom_scrollbar">
                <custom-scrollbar-track></custom-scrollbar-track>
                <custom-scrollbar-thumb></custom-scrollbar-thumb>
            </custom-scrollbar>
        </scroll-view>
    </display-body>
</dispaly-area>

<!-- Modal -->
<div class="overlay" id="modal_overlay" onclick="closeModal()"></div>
<modal_area id="modal_area" class="normal_modal" style="display:none;">
    <modal>
        <modal_title_area>
            <modal_title id="modal_title_text">Title</modal_title>
            <modal_close_btn onclick="closeModal()">
                <span style="font-size:18px;color:#fff;">✕</span>
            </modal_close_btn>
        </modal_title_area>
        <modal_content id="modal_content_area"></modal_content>
        <modal_button_area>
            <modal_button_group id="modal_btn_group" style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;padding:4px 0;">
            </modal_button_group>
        </modal_button_area>
    </modal>
</modal_area>

<!-- Toast / Pop -->
<div class="pop_area" id="pop_area"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
    page: 'welcome',
    history: [],
    packName: 'My 4D Skin Pack',
    serializeName: 'my4dskinpack',
    localizationName: 'my4dskinpack',
    geometryFile: null,
    geometryData: null,
    skins: [],
    editIdx: -1,
    editBuf: null,
};

const GEOMS = [
    ['geometry.humanoid.customSlim',   'Standard Slim (customSlim)'],
    ['geometry.humanoid.custom',       'Standard Wide (custom)'],
    ['geometry.MiniGameMasters.WolfTumbler', 'Wolf / Animal Ears (WolfTumbler)'],
    ['geometry.PawsAndClaws.tuxedocat','Tuxedo Cat (PawsAndClaws)'],
    ['geometry.ChineseMythology.DragonMotherGoddessLongmu','Dragon — Longmu'],
    ['geometry.ChineseMythology.SnakeCelestialGoddessNuwa','Snake Goddess — Nuwa'],
    ['geometry.ChineseMythology.MoonSpiritJadeRabbit','Moon Rabbit'],
    ['geometry.ChineseMythology.SouthernSymbolVermillionBird','Vermillion Bird'],
    ['geometry.ChineseMythology.Guanyin','Guanyin'],
    ['geometry.NorseMythology.Ratatoskr','Ratatoskr Squirrel'],
    ['geometry.BeachPartySkinPack.ClassyBeachwear','Classy Beachwear'],
    ['geometry.HolidaySkinPack2015.Tomte','Tomte (Holiday 2015)'],
    ['geometry.MarioBrothers.ShyGuy','Shy Guy (Mario Bros)'],
    ['geometry.MiniGameHeroes.MiniGameHeroesCatGlider','Cat Glider Hero'],
    ['geometry.MashupAdventureTime.PrincessBubblegum','Princess Bubblegum'],
    ['__custom__','✏ Custom — ketik sendiri'],
];

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function nav(page, addHist=true) {
    if (addHist && S.page !== page) S.history.push(S.page);
    S.page = page;
    renderPage();
    document.getElementById('btn_back').style.display = S.history.length ? 'flex' : 'none';
    const sc = document.getElementById('scroll_root');
    if (sc) sc.scrollTop = 0;
}

function goBack() {
    if (!S.history.length) return;
    S.page = S.history.pop();
    renderPage();
    document.getElementById('btn_back').style.display = S.history.length ? 'flex' : 'none';
}

function renderPage() {
    const pages = {
        welcome: pgWelcome, check_model: pgCheckModel,
        pack_settings: pgPackSettings, upload_geo: pgUploadGeo,
        skins_list: pgSkinsList, add_skin: pgAddSkin, preview: pgPreview,
    };
    (pages[S.page] || pgWelcome)();
}

// ═══════════════════════════════════════════
//  PAGES
// ═══════════════════════════════════════════

/* ── WELCOME ── */
function pgWelcome() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span_main">BE Skin 4D Maker</div>
            <div class="main_title_span_sub" style="font-size:14px;color:rgba(255,255,255,0.55);">
                Buat Skin Pack 4D untuk Minecraft Bedrock
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail style="font-size:14px;line-height:1.7;color:rgba(255,255,255,0.85);">
                    Tool ini memungkinkan kamu membuat <span style="color:#6CC349;font-weight:bold;">Skin Pack 4D</span>
                    untuk Minecraft Bedrock Edition. Skin 4D menggunakan geometry model khusus
                    (seperti ekor, sayap, telinga, dll) yang membuat karakter terlihat lebih hidup dan unik.
                </article_detail>

                <article_note style="margin:14px 0 10px;">
                    <div style="font-family:'Minecraft Five Bold',sans-serif;color:#FFE866;margin-bottom:8px;">⚠ PERSYARATAN</div>
                    <article_list>File <code>geometry.json</code> (model 4D)</article_list>
                    <article_list>File texture skin (<code>.png</code>) untuk setiap skin</article_list>
                    <article_list>File cape (<code>.png</code>) opsional per skin</article_list>
                </article_note>

                <article_note style="background-color:rgba(46,107,229,0.12);border-left-color:#2E6BE5;margin-bottom:4px;">
                    💡 Skin 4D adalah skin yang menggunakan geometry kustom (bukan humanoid standar).
                    Geometry ini dibuat di
                    <a href="https://web.blockbench.net/" target="_blank" style="color:#8CB3FF;">Blockbench</a>
                    dan memiliki tulang-tulang tambahan seperti ekor, sayap, tanduk, telinga hewan, dll.
                </article_note>
            </article_block>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group" style="flex-direction:column;gap:4px;">
                <button class="btn large_btn green_btn" onclick="nav('check_model')">🚀 Mulai Buat Skin Pack</button>
                <button class="btn large_btn normal_btn" onclick="showAbout()">ℹ️ Tentang Skin 4D</button>
            </div>
        </div>
    </div>

    <div class="footer_info" style="font-size:13px;color:rgba(255,255,255,0.35);">
        BE Skin 4D Maker • Berbasis OreUI by Spectrollay
    </div>`);
}

/* ── CHECK MODEL ── */
function pgCheckModel() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);">LANGKAH 1 / 5</div>
            <div class="main_title_span_main" style="font-size:20px;margin-top:4px;">Model Geometry</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail style="font-size:14px;line-height:1.7;color:rgba(255,255,255,0.85);margin-bottom:14px;">
                    Apakah kamu sudah punya file <code>geometry.json</code> untuk model 4D kamu?
                </article_detail>
                <article_note style="background-color:rgba(255,255,255,0.04);border-left-color:rgba(255,255,255,0.3);">
                    <div style="font-family:'Minecraft Five Bold',sans-serif;font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;">Apa itu geometry.json?</div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.6;">
                        File yang mendefinisikan bentuk 3D skin kamu termasuk tulang tambahan seperti ekor, sayap, telinga hewan,
                        atau bagian tubuh unik lainnya. Dibuat menggunakan Blockbench.
                    </div>
                </article_note>
            </article_block>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group" style="flex-direction:column;gap:6px;">
                <link-block style="margin:0 0 4px;" onclick="nav('pack_settings')">
                    <div class="link_title"><span class="link_title_text">✅ Ya, saya sudah punya geometry.json</span></div>
                    <div class="link_description">Lanjut ke pengaturan pack</div>
                </link-block>
                <link-block style="margin:0 0 4px;" onclick="openBlockbench()">
                    <div class="link_title"><span class="link_title_text">🔨 Belum — buat di Blockbench dulu</span></div>
                    <div class="link_description">Buka web.blockbench.net di tab baru</div>
                </link-block>
                <link-block style="margin:0;" onclick="useBuiltin()">
                    <div class="link_title"><span class="link_title_text">📦 Pakai geometry built-in Minecraft</span></div>
                    <div class="link_description">Tidak perlu geometry.json — gunakan model bawaan game</div>
                </link-block>
            </div>
        </div>
    </div>`);
}

function openBlockbench() {
    showModal('🔨 Buka Blockbench',
        `<div style="font-size:13px;line-height:1.8;color:rgba(255,255,255,0.8);">
            Kamu akan diarahkan ke <strong style="color:#8CB3FF;">web.blockbench.net</strong>.<br><br>
            <strong style="color:#FFE866;">Langkah membuat model 4D:</strong>
            <div style="margin:8px 0;padding-left:12px;color:rgba(255,255,255,0.65);font-size:12px;line-height:2;">
                1. New Project → Bedrock Entity<br>
                2. Buat model dengan tulang/bone tambahan<br>
                3. Format versi → <code>1.8.0</code><br>
                4. Export → Bedrock Geometry (.json)<br>
                5. Kembali ke sini dan lanjutkan
            </div>
        </div>`,
        [
            { label: '🌐 Buka Blockbench', cls: 'green_btn', fn: () => { window.open('https://web.blockbench.net/','_blank'); closeModal(); } },
            { label: 'Nanti', cls: 'normal_btn', fn: closeModal },
        ]
    );
}

function useBuiltin() {
    S.geometryFile = null; S.geometryData = null;
    nav('pack_settings');
    pop('✅ Mode built-in — geometry.json opsional', 'success');
}

/* ── PACK SETTINGS ── */
function pgPackSettings() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);">LANGKAH 2 / 5</div>
            <div class="main_title_span_main" style="font-size:20px;margin-top:4px;">Pengaturan Pack</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="ore_field_group">
                <div class="ore_field">
                    <label class="ore_label">Nama Pack <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_name" type="text" value="${esc(S.packName)}"
                        placeholder="Contoh: My 4D Skin Pack"
                        oninput="S.packName=this.value">
                    <div class="ore_hint">Nama yang ditampilkan di Minecraft</div>
                </div>
                <div class="ore_field">
                    <label class="ore_label">Serialize Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_ser" type="text" value="${esc(S.serializeName)}"
                        placeholder="my_4d_pack"
                        oninput="S.serializeName=toId(this.value);this.value=S.serializeName">
                    <div class="ore_hint">ID internal — huruf kecil & underscore saja</div>
                </div>
                <div class="ore_field">
                    <label class="ore_label">Localization Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_loc" type="text" value="${esc(S.localizationName)}"
                        placeholder="my_4d_pack"
                        oninput="S.localizationName=toId(this.value);this.value=S.localizationName">
                    <div class="ore_hint">Nama untuk skins.json serialize_name</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="savePackSettings()">▶ Lanjut</button>
            </div>
        </div>
    </div>`);
}

function savePackSettings() {
    const n = document.getElementById('f_name').value.trim();
    const s = document.getElementById('f_ser').value.trim();
    const l = document.getElementById('f_loc').value.trim();
    if (!n || !s || !l) { pop('❌ Semua field wajib diisi!', 'error'); return; }
    S.packName = n; S.serializeName = s; S.localizationName = l;
    nav('upload_geo');
}

/* ── UPLOAD GEO ── */
function pgUploadGeo() {
    const hasGeo = !!S.geometryData;
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);">LANGKAH 3 / 5</div>
            <div class="main_title_span_main" style="font-size:20px;margin-top:4px;">Upload Geometry</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:14px;line-height:1.6;">
                    Upload file <code>geometry.json</code> model 4D kamu. Jika pakai built-in geometry, langkah ini bisa dilewati.
                </article_detail>
            </article_block>

            <div class="ore_dropzone ${hasGeo ? 'ore_dropzone_ok' : ''}" id="geo_dz"
                onclick="document.getElementById('geo_fi').click()"
                ondragover="event.preventDefault();this.classList.add('ore_dropzone_hover')"
                ondragleave="this.classList.remove('ore_dropzone_hover')"
                ondrop="onGeoDrop(event)">
                ${hasGeo ? `
                    <div style="font-size:28px;">✅</div>
                    <div class="dz_label" style="color:#6CC349;">${esc(S.geometryFile.name)}</div>
                    <div class="dz_sub">${geoNames().length} model — klik untuk ganti</div>
                ` : `
                    <div style="font-size:36px;margin-bottom:4px;">📄</div>
                    <div class="dz_label">Klik atau drag geometry.json di sini</div>
                    <div class="dz_sub">Format: .json</div>
                `}
            </div>
            <input type="file" id="geo_fi" accept=".json" style="display:none" onchange="onGeoFile(this.files[0])">

            ${hasGeo ? `
            <article_note style="background-color:rgba(108,195,73,0.1);border-left-color:#6CC349;margin-top:12px;">
                <div style="font-size:12px;color:#6CC349;font-weight:bold;margin-bottom:4px;">✅ Geometry dimuat</div>
                <div style="font-size:12px;color:rgba(255,255,255,0.5);">${geoNames().join(' • ')}</div>
            </article_note>` : ''}
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group" style="flex-direction:column;gap:6px;">
                <button class="btn large_btn green_btn" onclick="nav('skins_list')">
                    ${hasGeo ? '▶ Lanjut ke Daftar Skin' : '⏩ Lewati — Pakai Built-in'}
                </button>
            </div>
        </div>
    </div>`);
}

function onGeoDrop(e) {
    e.preventDefault(); e.currentTarget.classList.remove('ore_dropzone_hover');
    const f = e.dataTransfer.files[0]; if (f) onGeoFile(f);
}
function onGeoFile(file) {
    if (!file?.name.endsWith('.json')) { pop('❌ File harus .json!', 'error'); return; }
    const r = new FileReader();
    r.onload = e => {
        try {
            S.geometryData = JSON.parse(e.target.result);
            S.geometryFile = file;
            pop('✅ geometry.json dimuat!', 'success');
            pgUploadGeo();
        } catch { pop('❌ JSON tidak valid!', 'error'); }
    };
    r.readAsText(file);
}
function geoNames() {
    if (!S.geometryData) return [];
    return Object.keys(S.geometryData).filter(k => k.startsWith('geometry.'));
}

/* ── SKINS LIST ── */
function pgSkinsList() {
    const skins = S.skins;
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);">LANGKAH 4 / 5</div>
            <div class="main_title_span_main" style="font-size:20px;margin-top:4px;">Daftar Skin</div>
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);margin-top:2px;">
                ${skins.length} skin ditambahkan
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group" style="margin-bottom:10px;">
                <button class="btn large_btn green_btn" onclick="startAdd()">➕ Tambah Skin Baru</button>
            </div>

            ${skins.length === 0 ? `
            <div class="ore_empty_state">
                <div style="font-size:44px;margin-bottom:8px;">👤</div>
                <div style="font-size:14px;color:rgba(255,255,255,0.4);">Belum ada skin.<br>Tambahkan skin pertama kamu.</div>
            </div>
            ` : skins.map((sk, i) => `
            <div class="ore_skin_row">
                <div class="ore_skin_thumb">
                    ${sk.texPrev
                        ? `<img src="${sk.texPrev}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">`
                        : '<span style="font-size:22px;">👤</span>'}
                </div>
                <div class="ore_skin_info">
                    <div class="ore_skin_name">${esc(sk.locName || 'Unnamed')}</div>
                    <div class="ore_skin_geo">${esc(sk.geometry)}</div>
                    <div class="ore_skin_tags">
                        <span class="otag ${sk.type==='free'?'otag_g':'otag_y'}">${sk.type}</span>
                        ${sk.texFile ? '<span class="otag otag_b">Texture ✓</span>' : '<span class="otag otag_r">No Tex</span>'}
                        ${sk.capeFile ? '<span class="otag otag_b">Cape ✓</span>' : ''}
                        ${sk.anim ? '<span class="otag otag_p">Anim ✓</span>' : ''}
                    </div>
                </div>
                <div class="ore_skin_btns">
                    <button class="btn extra_small_btn normal_btn" style="height:28px;font-size:11px;margin:2px;" onclick="editSkin(${i})">✏️</button>
                    <button class="btn extra_small_btn red_btn"    style="height:28px;font-size:11px;margin:2px;" onclick="delSkin(${i})">🗑️</button>
                </div>
            </div>
            `).join('')}
        </div>
    </div>

    ${skins.length > 0 ? `
    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="nav('preview')">📦 Buat Skin Pack ZIP</button>
            </div>
        </div>
    </div>` : ''}`);
}

function startAdd() {
    S.editIdx = -1;
    S.editBuf = { locName:'', geometry:'geometry.humanoid.customSlim', customGeo:'',
                  texFile:null, texPrev:null, capeFile:null, capePrev:null,
                  type:'free', anim:false };
    nav('add_skin');
}
function editSkin(i) {
    S.editIdx = i;
    const sk = S.skins[i];
    S.editBuf = { ...sk, customGeo: sk._customGeo || '' };
    nav('add_skin');
}
function delSkin(i) {
    S.skins.splice(i, 1);
    pgSkinsList();
    pop('🗑️ Skin dihapus', 'process');
}

/* ── ADD / EDIT SKIN ── */
function pgAddSkin() {
    const b = S.editBuf, isEdit = S.editIdx >= 0;
    const geoOpts = GEOMS.map(([v,l]) =>
        `<option value="${esc(v)}" ${b.geometry===v?'selected':''}>${esc(l)}</option>`
    ).join('');
    const extraGeos = geoNames().filter(g => !GEOMS.find(([v])=>v===g));

    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span" style="font-size:13px;color:rgba(255,255,255,0.4);">LANGKAH 4 / 5</div>
            <div class="main_title_span_main" style="font-size:20px;margin-top:4px;">${isEdit?'✏️ Edit Skin':'➕ Tambah Skin'}</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="ore_field_group">

                <div class="ore_field">
                    <label class="ore_label">Localization Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="es_loc" type="text" value="${esc(b.locName)}"
                        placeholder="Contoh: Steve, MySkin01"
                        oninput="S.editBuf.locName=this.value">
                    <div class="ore_hint">ID unik skin dalam pack</div>
                </div>

                <div class="ore_field">
                    <label class="ore_label">Model Geometry <span class="ore_required">*</span></label>
                    <select class="ore_select" id="es_geo" onchange="onGeoSel(this.value)">
                        ${geoOpts}
                        ${extraGeos.map(g=>`<option value="${esc(g)}" ${b.geometry===g?'selected':''}>📁 ${esc(g)}</option>`).join('')}
                    </select>
                </div>

                <div class="ore_field" id="custom_geo_field" style="${b.geometry==='__custom__'?'':'display:none;'}">
                    <label class="ore_label">Custom Geometry</label>
                    <input class="ore_input" id="es_cgeo" type="text" value="${esc(b.customGeo)}"
                        placeholder="geometry.Pack.ModelName"
                        oninput="S.editBuf.customGeo=this.value">
                    <div class="ore_hint">Nama geometry persis seperti di geometry.json</div>
                </div>

            </div>
        </div>
    </div>

function onGeoSel(v) {
    S.editBuf.geometry = v;
    const f = document.getElementById('custom_geo_field');
    if (f) f.style.display = v === '__custom__' ? '' : 'none';
}
function onTexDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('ore_dropzone_hover'); onTexFile(e.dataTransfer.files[0]); }
function onCapeDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('ore_dropzone_hover'); onCapeFile(e.dataTransfer.files[0]); }
function onTexFile(f) {
    if (!f?.type.includes('png')) { pop('❌ Hanya file PNG!','error'); return; }
    readDataUrl(f, url => { S.editBuf.texFile=f; S.editBuf.texPrev=url; pgAddSkin(); });
}
function onCapeFile(f) {
    if (!f?.type.includes('png')) { pop('❌ Hanya file PNG!','error'); return; }
    readDataUrl(f, url => { S.editBuf.capeFile=f; S.editBuf.capePrev=url; pgAddSkin(); });
}
function rmCape() { S.editBuf.capeFile=null; S.editBuf.capePrev=null; pgAddSkin(); }
function toggleAnim() {
    S.editBuf.anim = !S.editBuf.anim;
    const cb = document.getElementById('anim_cb');
    if (cb) cb.classList.toggle('on', S.editBuf.anim);
}

function saveSkin() {
    const b = S.editBuf;
    const locName = document.getElementById('es_loc')?.value?.trim() || b.locName;
    let geo = b.geometry;
    if (geo === '__custom__') {
        geo = document.getElementById('es_cgeo')?.value?.trim() || b.customGeo;
        if (!geo) { pop('❌ Isi custom geometry!','error'); return; }
    }
    if (!locName) { pop('❌ Localization name wajib!','error'); return; }
    if (!b.texFile) { pop('❌ Texture skin wajib diupload!','error'); return; }
    const dup = S.skins.findIndex((s,i) => s.locName===locName && i!==S.editIdx);
    if (dup>=0) { pop('❌ Localization name sudah dipakai!','error'); return; }

    const entry = {
        locName, geometry: geo, _customGeo: b.geometry==='__custom__'?geo:undefined,
        texFile: b.texFile, texPrev: b.texPrev,
        capeFile: b.capeFile, capePrev: b.capePrev,
        type: b.type,
        anim: b.anim ? { 'move.arms': 'animation.player.move.arms.zombie' } : null,
    };
    if (S.editIdx >= 0) { S.skins[S.editIdx] = entry; pop('✅ Skin diperbarui!','success'); }
    else { S.skins.push(entry); pop('✅ Skin ditambahkan!','success'); }
    nav('skins_list');
}

/* ── GENERATE ZIP ── */
async function generateZip() {
    const btn = document.getElementById('gen_btn');
    if (btn) { btn.disabled=true; btn.textContent='⏳ Generating...'; btn.classList.add('disabled_btn'); btn.classList.remove('green_btn'); }
    try {
        const zip = new JSZip();
        const fn  = safeName(S.packName);
        const dir = zip.folder(fn);

        dir.file('manifest.json', JSON.stringify({
            format_version:2,
            header:{ name:S.packName, uuid:uuid(), version:[1,0,0] },
            modules:[{ type:'skin_pack', uuid:uuid(), version:[1,0,0] }]
        }, null, 4));

        if (S.geometryData) dir.file('geometry.json', JSON.stringify(S.geometryData, null, 3));

        const skins = [];
        for (const sk of S.skins) {
            const tname = safeName(sk.locName) + '_texture.png';
            if (sk.texFile) dir.file(tname, await toAB(sk.texFile), {binary:true});
            let cname = null;
            if (sk.capeFile) { cname = safeName(sk.locName)+'_cape.png'; dir.file(cname, await toAB(sk.capeFile), {binary:true}); }
            const e = { localization_name:sk.locName, geometry:sk.geometry, texture:tname, type:sk.type };
            if (cname) e.cape = cname;
            if (sk.anim) e.animations = sk.anim;
            skins.push(e);
        }
        dir.file('skins.json', JSON.stringify({ skins, serialize_name:S.serializeName, localization_name:S.localizationName }, null, 2));

        const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = fn+'.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        pop('🎉 Download berhasil! Rename .zip → .mcpack untuk install.', 'success');
        if (btn) { btn.disabled=false; btn.textContent='✅ Download Lagi'; btn.classList.remove('disabled_btn'); btn.classList.add('green_btn'); }
    } catch(err) {
        pop('❌ Gagal generate: '+err.message, 'error');
        if (btn) { btn.disabled=false; btn.textContent='📦 Generate & Download ZIP'; btn.classList.remove('disabled_btn'); btn.classList.add('green_btn'); }
    }
}

function showModal(title, body, actions) {
    document.getElementById('modal_title_text').textContent = title;
    document.getElementById('modal_content_area').innerHTML = body;
    const bg = document.getElementById('modal_btn_group');
    bg.innerHTML = '';
    actions.forEach(a => {
        const b = document.createElement('button');
        b.className = `btn middle_btn ${a.cls}`;
        b.innerHTML = a.label;
        b.onclick = a.fn;
        bg.appendChild(b);
    });
    document.getElementById('modal_overlay').style.display = 'block';
    document.getElementById('modal_area').style.display = 'block';
}
function closeModal() {
    document.getElementById('modal_overlay').style.display = 'none';
    document.getElementById('modal_area').style.display = 'none';
}

// ═══════════════════════════════════════════
//  POP TOAST
// ═══════════════════════════════════════════
function pop(msg, type='') {
    const area = document.getElementById('pop_area');
    const el = document.createElement('div');
    el.className = `pop ${type}`;
    el.textContent = msg;
    area.appendChild(el);
    requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 3000);
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function set(html) { document.getElementById('main_content').innerHTML = html; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toId(s) { return s.toLowerCase().replace(/[^a-z0-9_]/g,'_').replace(/_+/g,'_'); }
function safeName(s) { return s.replace(/[^a-zA-Z0-9_\-\.]/g,'_'); }
function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0; return(c==='x'?r:(r&0x3|0x8)).toString(16); }); }
function readDataUrl(f, cb) { const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(f); }
function toAB(f) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsArrayBuffer(f); }); }
