<!DOCTYPE html>
<html lang="id">
<head>
    <base href="./">
    <meta charset="UTF-8">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="./stylesheet/loading_mask.css" rel="stylesheet">
    <link href="./stylesheet/public_style.css" rel="stylesheet">
    <link href="./stylesheet/oreui.css" rel="stylesheet">
    <link href="./stylesheet/app.css" rel="stylesheet">
    <link href="./stylesheet/mobile_fix.css" rel="stylesheet">
    <title>BE Skin 4D Maker</title>
</head>

<div class="loading_mask" id="loading_mask">
    <div>
        <div class="spinner"><img alt="" src="./images/Loading_white.gif" style="height:48px;"/></div>
        <div class="spinner"><div class="spinner"><span style="color:rgba(255,255,255,0.6);font-family:'NotoSans Bold',sans-serif;font-size:13px;">BE Skin 4D Maker</span></div></div>
    </div>
</div>

<body>
<dispaly-area>
    <header>
        <div class="header_item header_item_left" id="btn_back" onclick="goBack()" style="display:none;cursor:pointer;">
            <span class="header_left_icon" style="font-size:20px;padding:0 10px;">‹</span>
        </div>
        <div class="header_item header_item_left header_item_blank" id="btn_back_placeholder"></div>
        <div class="header_logo">
            <div class="header_title">⛏ BE Skin 4D Maker</div>
        </div>
        <div class="header_item header_item_right" onclick="showAbout()" style="cursor:pointer;">
            <img alt="info" class="header_right_icon" src="./images/Github.png"/>
        </div>
    </header>

    <display-body>
        <scroll-view class="main_scroll_view">
            <scroll-container class="primary_scroll_container" id="scroll_root">
                <main class="scroll_container" id="main_content">
                    <!-- injected by JS -->
                </main>
            </scroll-container>
            <custom-scrollbar class="primary_custom_scrollbar">
                <custom-scrollbar-track></custom-scrollbar-track>
                <custom-scrollbar-thumb></custom-scrollbar-thumb>
            </custom-scrollbar>
        </scroll-view>
    </display-body>
</dispaly-area>

<!-- Modal -->
<div class="overlay" id="modal_overlay" onclick="closeModal()"></div>
<modal_area id="modal_area" class="normal_modal" style="display:none;">
    <modal>
        <modal_title_area>
            <modal_title id="modal_title_text">Title</modal_title>
            <modal_close_btn onclick="closeModal()">
                <span style="font-size:18px;color:#fff;">✕</span>
            </modal_close_btn>
        </modal_title_area>
        <modal_content id="modal_content_area"></modal_content>
        <modal_button_area>
            <modal_button_group id="modal_btn_group" style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;padding:4px 0;">
            </modal_button_group>
        </modal_button_area>
    </modal>
</modal_area>

<!-- Toast / Pop -->
<div class="pop_area" id="pop_area"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
    page: 'welcome',
    history: [],
    packName: 'My 4D Skin Pack',
    serializeName: 'my4dskinpack',
    localizationName: 'my4dskinpack',
    geometryFile: null,
    geometryData: null,
    skins: [],
    editIdx: -1,
    editBuf: null,
};

const GEOMS = [
    ['geometry.humanoid.customSlim',   'Standard Slim (customSlim)'],
    ['geometry.humanoid.custom',       'Standard Wide (custom)'],
    ['geometry.MiniGameMasters.WolfTumbler', 'Wolf / Animal Ears (WolfTumbler)'],
    ['geometry.PawsAndClaws.tuxedocat','Tuxedo Cat (PawsAndClaws)'],
    ['geometry.ChineseMythology.DragonMotherGoddessLongmu','Dragon — Longmu'],
    ['geometry.ChineseMythology.SnakeCelestialGoddessNuwa','Snake Goddess — Nuwa'],
    ['geometry.ChineseMythology.MoonSpiritJadeRabbit','Moon Rabbit'],
    ['geometry.ChineseMythology.SouthernSymbolVermillionBird','Vermillion Bird'],
    ['geometry.ChineseMythology.Guanyin','Guanyin'],
    ['geometry.NorseMythology.Ratatoskr','Ratatoskr Squirrel'],
    ['geometry.BeachPartySkinPack.ClassyBeachwear','Classy Beachwear'],
    ['geometry.HolidaySkinPack2015.Tomte','Tomte (Holiday 2015)'],
    ['geometry.MarioBrothers.ShyGuy','Shy Guy (Mario Bros)'],
    ['geometry.MiniGameHeroes.MiniGameHeroesCatGlider','Cat Glider Hero'],
    ['geometry.MashupAdventureTime.PrincessBubblegum','Princess Bubblegum'],
    ['__custom__','✏ Custom — ketik sendiri'],
];

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function nav(page, addHist=true) {
    if (addHist && S.page !== page) S.history.push(S.page);
    S.page = page;
    renderPage();
    const showBack = S.history.length > 0;
    document.getElementById('btn_back').style.display = showBack ? 'flex' : 'none';
    document.getElementById('btn_back_placeholder').style.display = showBack ? 'none' : 'flex';
    const sc = document.getElementById('scroll_root');
    if (sc) sc.scrollTop = 0;
}

function goBack() {
    if (!S.history.length) return;
    S.page = S.history.pop();
    renderPage();
    const showBack = S.history.length > 0;
    document.getElementById('btn_back').style.display = showBack ? 'flex' : 'none';
    document.getElementById('btn_back_placeholder').style.display = showBack ? 'none' : 'flex';
}

function renderPage() {
    const pages = {
        welcome: pgWelcome, check_model: pgCheckModel,
        pack_settings: pgPackSettings, upload_geo: pgUploadGeo,
        skins_list: pgSkinsList, add_skin: pgAddSkin, preview: pgPreview,
    };
    (pages[S.page] || pgWelcome)();
}

// ═══════════════════════════════════════════
//  PAGES
// ═══════════════════════════════════════════

/* ── WELCOME ── */
function pgWelcome() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span_main">BE Skin 4D Maker</div>
            <div class="main_title_span_sub">Buat Skin Pack 4D untuk Minecraft Bedrock</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail>
                    Tool ini memungkinkan kamu membuat <strong>Skin Pack 4D</strong> untuk Minecraft Bedrock Edition.
                    Skin 4D menggunakan geometry model khusus yang membuat karakter terlihat lebih hidup dan unik.
                </article_detail>
                <article_list_title>Persyaratan</article_list_title>
                <article_list>File <code>geometry.json</code> (model 4D)</article_list>
                <article_list>File texture skin (<code>.png</code>) untuk setiap skin</article_list>
                <article_list>File cape (<code>.png</code>) opsional per skin</article_list>
                <article_note>
                    Skin 4D menggunakan geometry kustom — bukan humanoid standar. Dibuat di
                    <a href="https://web.blockbench.net/" target="_blank">Blockbench</a>
                    dan bisa punya tulang tambahan seperti ekor, sayap, tanduk, telinga hewan, dll.
                    <br><br>
                    ⚠️ <strong>Install via <code>premium_cache/skin_packs</code></strong> — bukan .mcpack biasa, karena Mojang sudah menonaktifkan custom geometry di skin pack normal.
                </article_note>
            </article_block>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="nav('check_model')">Mulai Buat Skin Pack</button>
                <button class="btn large_btn normal_btn" onclick="showAbout()">Tentang Skin 4D</button>
            </div>
        </div>
    </div>

    <div class="footer_info">BE Skin 4D Maker • Berbasis OreUI by Spectrollay</div>`);
}

/* ── CHECK MODEL ── */
function pgCheckModel() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 1 / 5</div>
            <div class="main_title_span_main">Model Geometry</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail>Apakah kamu sudah punya file <code>geometry.json</code> untuk model 4D kamu?</article_detail>
                <article_list_title>Apa itu geometry.json?</article_list_title>
                <article_detail>
                    File yang mendefinisikan bentuk 3D skin kamu termasuk tulang tambahan seperti ekor, sayap,
                    telinga hewan, atau bagian tubuh unik lainnya. Dibuat menggunakan Blockbench.
                </article_detail>
            </article_block>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="link_block_group">
                <link-block onclick="nav('pack_settings')">
                    <div class="link_title"><span class="link_title_text">Ya, saya sudah punya geometry.json</span></div>
                    <div class="link_description">Lanjut ke pengaturan pack</div>
                </link-block>
                <link-block onclick="openBlockbench()">
                    <div class="link_title"><span class="link_title_text">Belum — buat di Blockbench dulu</span></div>
                    <div class="link_description">Buka web.blockbench.net di tab baru</div>
                </link-block>
                <link-block onclick="useBuiltin()">
                    <div class="link_title"><span class="link_title_text">Pakai geometry built-in Minecraft</span></div>
                    <div class="link_description">Tidak perlu geometry.json — gunakan model bawaan game</div>
                </link-block>
            </div>
        </div>
    </div>`);
}

/* ── PACK SETTINGS ── */
function pgPackSettings() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 2 / 5</div>
            <div class="main_title_span_main">Pengaturan Pack</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="ore_field_group">
                <div class="ore_field">
                    <label class="ore_label">Nama Pack <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_name" type="text" value="${esc(S.packName)}"
                        placeholder="Contoh: My 4D Skin Pack"
                        oninput="S.packName=this.value">
                    <div class="ore_hint">Nama yang ditampilkan di Minecraft</div>
                </div>
                <div class="ore_field">
                    <label class="ore_label">Serialize Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_ser" type="text" value="${esc(S.serializeName)}"
                        placeholder="my_4d_pack"
                        oninput="S.serializeName=toId(this.value);this.value=S.serializeName">
                    <div class="ore_hint">ID internal — huruf kecil & underscore saja</div>
                </div>
                <div class="ore_field">
                    <label class="ore_label">Localization Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="f_loc" type="text" value="${esc(S.localizationName)}"
                        placeholder="my_4d_pack"
                        oninput="S.localizationName=toId(this.value);this.value=S.localizationName">
                    <div class="ore_hint">Nama untuk skins.json serialize_name</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="savePackSettings()">Lanjut</button>
            </div>
        </div>
    </div>`);
}

/* ── UPLOAD GEO ── */
function pgUploadGeo() {
    const hasGeo = !!S.geometryData;
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 3 / 5</div>
            <div class="main_title_span_main">Upload Geometry</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <article_block>
                <article_detail>
                    Upload file <code>geometry.json</code> model 4D kamu.
                    Jika memakai built-in geometry, langkah ini bisa dilewati.
                </article_detail>
            </article_block>

            <div class="ore_dropzone ${hasGeo ? 'ore_dropzone_ok' : ''}" id="geo_dz"
                onclick="document.getElementById('geo_fi').click()"
                ondragover="event.preventDefault();this.classList.add('ore_dropzone_hover')"
                ondragleave="this.classList.remove('ore_dropzone_hover')"
                ondrop="onGeoDrop(event)">
                ${hasGeo ? `
                    <div class="dz_icon">✅</div>
                    <div class="dz_label">${esc(S.geometryFile.name)}</div>
                    <div class="dz_sub">${geoNames().length} model ditemukan — klik untuk ganti</div>
                ` : `
                    <div class="dz_icon">📄</div>
                    <div class="dz_label">Klik atau drag geometry.json ke sini</div>
                    <div class="dz_sub">Format: .json</div>
                `}
            </div>
            <input type="file" id="geo_fi" accept=".json" style="display:none" onchange="onGeoFile(this.files[0])">

            ${hasGeo ? `
            <article_note style="background-color:rgba(108,195,73,0.08);border-left-color:#6CC349;">
                Geometry berhasil dimuat: ${geoNames().join(', ')}
            </article_note>` : ''}
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="nav('skins_list')">
                    ${hasGeo ? 'Lanjut ke Daftar Skin' : 'Lewati — Pakai Built-in'}
                </button>
            </div>
        </div>
    </div>`);
}

/* ── SKINS LIST ── */
function pgSkinsList() {
    const skins = S.skins;
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 4 / 5</div>
            <div class="main_title_span_main">Daftar Skin</div>
            <div class="main_title_span">${skins.length} skin ditambahkan</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="startAdd()">Tambah Skin Baru</button>
            </div>
        </div>
    </div>

    ${skins.length === 0 ? `
    <div class="main main_block">
        <div class="main_content_center">
            <div class="main_detail_center">
                <div style="font-size:44px;margin-bottom:12px;">👤</div>
                <div>Belum ada skin.</div>
                <div>Tambahkan skin pertama kamu.</div>
            </div>
        </div>
    </div>` : `
    <div class="main main_block">
        <div class="main-header">Daftar Skin</div>
        <div class="main_block_content">
            <div class="link_block_group">
                ${skins.map((sk, i) => `
                <link-block style="cursor:default;">
                    <div style="display:flex;align-items:center;width:100%;gap:10px;padding:4px 0;">
                        <div class="ore_skin_thumb">
                            ${sk.texPrev
                                ? `<img src="${sk.texPrev}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">`
                                : '<span style="font-size:22px;">👤</span>'}
                        </div>
                        <div style="flex:1;min-width:0;text-align:left;">
                            <div style="font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(sk.locName || 'Unnamed')}</div>
                            <div style="font-size:11px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0 4px;">${esc(sk.geometry)}</div>
                            <div style="display:flex;flex-wrap:wrap;gap:4px;">
                                <span class="tag ${sk.type==='free'?'green_tag':'yellow_tag'}">${sk.type}</span>
                                ${sk.texFile ? '<span class="tag blue_tag">Texture ✓</span>' : '<span class="tag red_tag">No Tex</span>'}
                                ${sk.capeFile ? '<span class="tag blue_tag">Cape ✓</span>' : ''}
                                ${sk.anim ? '<span class="tag black_tag">Anim ✓</span>' : ''}
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
                            <button class="btn extra_small_btn normal_btn" style="height:30px;font-size:12px;" onclick="editSkin(${i})">Edit</button>
                            <button class="btn extra_small_btn red_btn" style="height:30px;font-size:12px;" onclick="delSkin(${i})">Hapus</button>
                        </div>
                    </div>
                </link-block>`).join('')}
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="nav('preview')">Buat Skin Pack ZIP</button>
            </div>
        </div>
    </div>`}
    `);
}

/* ── ADD / EDIT SKIN ── */
function pgAddSkin() {
    const b = S.editBuf, isEdit = S.editIdx >= 0;
    const geoOpts = GEOMS.map(([v,l]) =>
        `<option value="${esc(v)}" ${b.geometry===v?'selected':''}>${esc(l)}</option>`
    ).join('');
    const extraGeos = geoNames().filter(g => !GEOMS.find(([v])=>v===g));

    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 4 / 5</div>
            <div class="main_title_span_main">${isEdit ? 'Edit Skin' : 'Tambah Skin'}</div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main-header">Informasi Skin</div>
        <div class="main_block_content">
            <div class="ore_field_group">
                <div class="ore_field">
                    <label class="ore_label">Localization Name <span class="ore_required">*</span></label>
                    <input class="ore_input" id="es_loc" type="text" value="${esc(b.locName)}"
                        placeholder="Contoh: Steve, MySkin01"
                        oninput="S.editBuf.locName=this.value">
                    <div class="ore_hint">ID unik skin dalam pack</div>
                </div>
                <div class="ore_field">
                    <label class="ore_label">Model Geometry <span class="ore_required">*</span></label>
                    <select class="ore_select" id="es_geo" onchange="onGeoSel(this.value)">
                        ${geoOpts}
                        ${extraGeos.map(g=>`<option value="${esc(g)}" ${b.geometry===g?'selected':''}>📁 ${esc(g)}</option>`).join('')}
                    </select>
                </div>
                <div class="ore_field" id="custom_geo_field" style="${b.geometry==='__custom__'?'':'display:none;'}">
                    <label class="ore_label">Custom Geometry</label>
                    <input class="ore_input" id="es_cgeo" type="text" value="${esc(b.customGeo)}"
                        placeholder="geometry.Pack.ModelName"
                        oninput="S.editBuf.customGeo=this.value">
                    <div class="ore_hint">Nama geometry persis seperti di geometry.json</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main-header">File Upload</div>
        <div class="main_block_content">
            <div class="ore_field" style="margin-bottom:12px;">
                <label class="ore_label">Texture Skin <span class="ore_required">*</span></label>
                <div class="ore_dropzone ore_dropzone_mini ${b.texFile?'ore_dropzone_ok':''}" id="tex_dz"
                    onclick="document.getElementById('tex_fi').click()"
                    ondragover="event.preventDefault();this.classList.add('ore_dropzone_hover')"
                    ondragleave="this.classList.remove('ore_dropzone_hover')"
                    ondrop="onTexDrop(event)">
                    ${b.texFile ? `
                        ${b.texPrev?`<img src="${b.texPrev}" class="dz_mini_img">`:''}
                        <div class="dz_mini_info">
                            <div class="dz_label" style="color:#6CC349;">${esc(b.texFile.name)}</div>
                            <div class="dz_sub">Klik untuk ganti</div>
                        </div>
                    ` : `
                        <span style="font-size:22px;">🖼️</span>
                        <div class="dz_mini_info">
                            <div class="dz_label">Upload texture PNG</div>
                            <div class="dz_sub">Drag & drop atau klik</div>
                        </div>
                    `}
                </div>
                <input type="file" id="tex_fi" accept=".png,image/png" style="display:none" onchange="onTexFile(this.files[0])">
            </div>
            <div class="ore_field">
                <label class="ore_label">Cape <span class="ore_optional">(opsional)</span></label>
                <div class="ore_dropzone ore_dropzone_mini ${b.capeFile?'ore_dropzone_ok':''}" id="cape_dz"
                    onclick="document.getElementById('cape_fi').click()"
                    ondragover="event.preventDefault();this.classList.add('ore_dropzone_hover')"
                    ondragleave="this.classList.remove('ore_dropzone_hover')"
                    ondrop="onCapeDrop(event)">
                    ${b.capeFile ? `
                        ${b.capePrev?`<img src="${b.capePrev}" class="dz_mini_img">`:''}
                        <div class="dz_mini_info">
                            <div class="dz_label" style="color:#6CC349;">${esc(b.capeFile.name)}</div>
                            <div class="dz_sub">Klik untuk ganti</div>
                        </div>
                    ` : `
                        <span style="font-size:22px;">🪂</span>
                        <div class="dz_mini_info">
                            <div class="dz_label">Upload cape PNG (opsional)</div>
                        </div>
                    `}
                </div>
                <input type="file" id="cape_fi" accept=".png,image/png" style="display:none" onchange="onCapeFile(this.files[0])">
                ${b.capeFile?`<button onclick="rmCape()" class="ore_link_btn">Hapus cape</button>`:''}
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main-header">Pengaturan</div>
        <div class="main_block_content">
            <div class="ore_field" style="margin-bottom:12px;">
                <label class="ore_label">Tipe Skin</label>
                <div style="display:flex;gap:16px;margin-top:6px;">
                    <label class="ore_radio">
                        <input type="radio" name="sk_type" value="free" ${b.type==='free'?'checked':''}
                            onchange="S.editBuf.type='free'"> Free
                    </label>
                    <label class="ore_radio">
                        <input type="radio" name="sk_type" value="paid" ${b.type==='paid'?'checked':''}
                            onchange="S.editBuf.type='paid'"> Paid
                    </label>
                </div>
            </div>
            <div class="ore_field ore_checkbox_row" onclick="toggleAnim()">
                <div class="custom-checkbox ${b.anim?'on':''}" id="anim_cb"></div>
                <div style="margin-left:10px;">
                    <div class="ore_label" style="cursor:pointer;margin-bottom:0;">Zombie Arms Animation</div>
                    <div class="ore_hint">Lengan bergerak seperti zombie (move.arms)</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main main_block">
        <div class="main_block_content">
            <div class="btn_group">
                <button class="btn large_btn green_btn" onclick="saveSkin()">
                    ${isEdit ? 'Simpan Perubahan' : 'Tambahkan Skin'}
                </button>
                <button class="btn large_btn normal_btn" onclick="nav('skins_list')">Batal</button>
            </div>
        </div>
    </div>`);
}

/* ── PREVIEW ── */
function pgPreview() {
    set(`
    <div class="main_title">
        <div class="main_title_area">
            <div class="main_title_span">LANGKAH 5 / 5</div>
            <div class="main_title_span_main">Preview & Generate</div>
        </div>
    </div>

    <div class="main main_block">

/* ── GENERATE ZIP ── */
async function generateZip() {
    const btn = document.getElementById('gen_btn');
    if (btn) { btn.disabled=true; btn.textContent='⏳ Generating...'; btn.classList.add('disabled_btn'); btn.classList.remove('green_btn'); }
    try {
        const zip = new JSZip();
        const fn  = safeName(S.packName);
        const dir = zip.folder(fn);

        dir.file('manifest.json', JSON.stringify({
            format_version:2,
            header:{ name:S.packName, uuid:uuid(), version:[1,0,0] },
            modules:[{ type:'skin_pack', uuid:uuid(), version:[1,0,0] }]
        }, null, 4));

        if (S.geometryData) dir.file('geometry.json', JSON.stringify(S.geometryData, null, 3));

        const skins = [];
        for (const sk of S.skins) {
            const tname = safeName(sk.locName) + '_texture.png';
            if (sk.texFile) dir.file(tname, await toAB(sk.texFile), {binary:true});
            let cname = null;
            if (sk.capeFile) { cname = safeName(sk.locName)+'_cape.png'; dir.file(cname, await toAB(sk.capeFile), {binary:true}); }
            const e = { localization_name:sk.locName, geometry:sk.geometry, texture:tname, type:sk.type };
            if (cname) e.cape = cname;
            if (sk.anim) e.animation_type = 'zombie';
            skins.push(e);
        }
        dir.file('skins.json', JSON.stringify({ skins, serialize_name:S.serializeName, localization_name:S.localizationName }, null, 2));

        const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = fn+'.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        pop('🎉 Download berhasil! Extract ZIP lalu pindahkan foldernya ke premium_cache/skin_packs.', 'success');
        if (btn) { btn.disabled=false; btn.textContent='✅ Download Lagi'; btn.classList.remove('disabled_btn'); btn.classList.add('green_btn'); }
    } catch(err) {
        pop('❌ Gagal generate: '+err.message, 'error');
        if (btn) { btn.disabled=false; btn.textContent='📦 Generate & Download ZIP'; btn.classList.remove('disabled_btn'); btn.classList.add('green_btn'); }
    }
}

function showModal(title, body, actions) {

//  POP TOAST
// ═══════════════════════════════════════════
function pop(msg, type='') {
    const area = document.getElementById('pop_area');
    const el = document.createElement('div');
    el.className = `pop ${type}`;
    el.textContent = msg;
    area.appendChild(el);
    requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 3000);
}

//  HELPERS
// ═══════════════════════════════════════════
function set(html) { document.getElementById('main_content').innerHTML = html; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toId(s) { return s.toLowerCase().replace(/[^a-z0-9_]/g,'_').replace(/_+/g,'_'); }
function safeName(s) { return s.replace(/[^a-zA-Z0-9_\-\.]/g,'_'); }
function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0; return(c==='x'?r:(r&0x3|0x8)).toString(16); }); }
function readDataUrl(f, cb) { const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(f); }
function toAB(f) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsArrayBuffer(f); }); }

function geoNames() {
    if (!S.geometryData) return [];
    return Object.keys(S.geometryData).filter(k => k !== 'format_version');
}

function onGeoFile(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
        try {
            S.geometryData = JSON.parse(e.target.result);
            S.geometryFile = file;
            pop('✅ Geometry berhasil dimuat: ' + geoNames().length + ' model', 'success');
            pgUploadGeo();
        } catch(err) {
            pop('❌ File geometry.json tidak valid: ' + err.message, 'error');
        }
    };
    r.readAsText(file);
}

function onGeoDrop(event) {
    event.preventDefault();

    if (file && file.name.endsWith('.json')) onGeoFile(file);

function newEditBuf() {
    return {
        locName: '',
        geometry: GEOMS[0][0],
        customGeo: '',
        texFile: null,
        texPrev: null,
        capeFile: null,
        capePrev: null,
        type: 'free',
        anim: null,
    };
}

function startAdd() {
    S.editIdx = -1;
    S.editBuf = newEditBuf();
    nav('add_skin');
}

function editSkin(i) {
    S.editIdx = i;
    S.editBuf = Object.assign({}, S.skins[i]);
    nav('add_skin');
}

function delSkin(i) {
    showModal('🗑 Hapus Skin', `<div style="font-size:13px;color:rgba(255,255,255,0.8);">Hapus skin <strong>${esc(S.skins[i].locName || 'ini')}</strong>?</div>`,
        [
            { label: 'Hapus', cls: 'red_btn', fn: () => { S.skins.splice(i, 1); closeModal(); nav('skins_list', false); } },
            { label: 'Batal', cls: 'normal_btn', fn: closeModal }
        ]
    );
}

function saveSkin() {
    const b = S.editBuf;
    if (!b.locName.trim()) { pop('❌ Localization name tidak boleh kosong', 'error'); return; }
    if (!b.texFile) { pop('❌ Texture skin wajib diupload', 'error'); return; }
    const finalGeo = b.geometry === '__custom__' ? (b.customGeo || '').trim() : b.geometry;
    if (!finalGeo) { pop('❌ Geometry tidak boleh kosong', 'error'); return; }
    const skin = Object.assign({}, b, { geometry: finalGeo });
    if (S.editIdx >= 0) {
        S.skins[S.editIdx] = skin;
        pop('✅ Skin diperbarui!', 'success');
    } else {
        S.skins.push(skin);
        pop('✅ Skin ditambahkan!', 'success');
    }
    nav('skins_list');
}

function toggleAnim() {
    const b = S.editBuf;
    // Format animasi MCBE yang benar untuk zombie arms
    b.anim = b.anim ? null : true;
    const cb = document.getElementById('anim_cb');
    if (cb) cb.className = 'custom-checkbox ' + (b.anim ? 'on' : '');
}

function rmCape() {

}

    S.editBuf.geometry = val;
